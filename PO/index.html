<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Caffeine Ministry - PO System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1b4332">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { parchment: '#fcfbf7', hunter: '#1b4332', antiqueGold: '#b8860b' },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>body { background-color: #fcfbf7; color: #1b4332; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEFAULT_SUPPLIERS = [
            { "name": "Rare Beans Company", "phone": "8619122260" },
            { "name": "Aditya Industries", "phone": "9595711611" },
            { "name": "Renu Devi & Sons", "phone": "7737840411" },
            { "name": "Cash Purchase", "phone": "" },
            { "name": "Viman Hospitality and Entertainment Private Limited", "phone": "8058764004" },
            { "name": "Neha Agencies", "phone": "9414105084" },
            { "name": "Charu Marketing", "phone": "8824153406" },
            { "name": "Laxmi Stores", "phone": "6378749797" }
        ];

        // FULL INVENTORY IMPORTED DIRECTLY FROM EXCEL SHEETS
        const INVENTORY = {
            "Fruits and Vegetables": [
                "Apple (सेव)", "Asparagus (ऐस्पैरागस)", "Avocado (अवोकेडो)", "Banana (केले)", "Basil (बेसिल)", "Beans (बीन्स)", "Beetroot (चुकंदर)", "Broccoli (ब्रोकली)", "Cabbage (पत्ता गोभी)", "Green Capsicum (शिमला मिर्च)", "Capsicum Red & Yellow (लाल व पीली शिमला मिर्च)", "Carrot (गाजर)", "Cauliflower (फूलगोभी)", "Cellary (सैलरी)", "Cherry Tomato (चेरी टोमेटो)", "Cucumber (खीरा)", "Garlic (लहसुन) (Peeled)", "Ginger (अदरक)", "Green Chilli (हरी मिर्च)", "G4 (small हरी मिर्च)", "Green Lollo Rosso Lettuce", "Iceberg Lettuce", "Kaffir Lime", "Lemon (नींबू)", "Mint (पुदीना)", "Mango (तोतापुरी आम)", "Mushroom (मशरुम)", "Onion (प्याज़) (Big)", "Orange (माल्टा)", "Parsley (पार्स्ली)", "Pineapple (पाइनएप्पल)", "Pokchoy (पोकचॉय)", "Potato (आलू)", "Pumpkin (Big) (बड़ा कदु)", "Red Lollo Rosso Lettuce", "Red Cabbage (लाल पत्तागोभी)", "Spinach (पालक)", "Spring onion (प्याज पुली)", "Strawberry (स्ट्रॉबेरी)", "Thyme (थाइम)", "Tomato (टमाटर) (Grevy)", "Watermelon (तरबूज़)(large)", "Zucchini (ज़ुच्चिनी)(Green & Yellow)", "Pomegranate (अनार)", "Coriander (धनिया)", "Brinjal (बैंगन) (Big)", "Ladyfingers (भिंडी)", "लौकी", "टिण्डा", "काचरी", "ग्वार फली"
            ],
            "Coffee and Matcha": [
                "Full House Green (Arabica Coffee) (Dark Roast)", "Baarbara Green (Cold Brew)", "Matcha (Premium Grade)"
            ],
            "Groceries": [
                "Aata", "Ajinomoto", "Aluminium Foil", "Amul Butter", "Amul Cheese Slice (Large Pack)", "Amul Cream", "Amul Mithai Mate (400 gms)", "Amul Pizza Cheese Blend (Shredded)", "Amul Processed Cheese", "Aromate Powder", "Besan", "Bisleri Vedica (500ml)", "Biscoff Biscuit", "Biscoff Spread", "Black Olive (3 Kg)", "Black Pepper (आखी)", "Black Salt (काला नमक)", "Blueberry (Frozen) (Delishh)", "Brown Rice", "Brown Sugar", "Brownie Premix", "Cashewnut (Kaju Tukdi)", "Channa Dal", "Chaat Masala", "Chilli Flakes", "Chilli Flakes (Sachet)", "Chings Chowmein Noodle", "Chocolate Sauce (Hersheys)", "Coconut Powder", "corn starch", "Cranberry Juice (Real) (1 Ltr.)", "Cream Cheese", "Dark Chocolate Compound (Morde)", "Dark Soya Sauce", "Dates (Seedless)", "Degi Mirch", "Dhaniya Powder", "Dijon Mustard", "McVitie's Digestive Biscuit (Family Pack)", "Duster Cloth", "Feta Cheese", "French Fries (2.5 Kg)", "Fusilli Pasta (Agnesi)", "Garam Masala", "Garden Nylon Sev", "Green Chilli Sauce (5 Kg)", "Peanut Butter (750 gms)", "Penne Pasta (Agnesi)", "Pickled Sushi Ginger", "Green Olive (Whole)", "Green Tea (100 Tea Bags) (Lipton)", "Haldi Powder", "Hara Moong (Sprouts)", "Honey (1 Kg)", "Jalapeño", "Japanese Mayo", "Jeera", "Kaala Channa (Black)", "Kabuli Chana", "Kaju Tukdi", "Kasundi Musturd Sauce", "Kitchen King Masala Powder", "Lasagna Sheets (Agnesi)", "Litchi Juice (Real) (1 Ltr.)", "Macaroni Pasta (Agnesi Chifferi Pasta)", "Maida (1 Bag)", "Malabar Paratha", "Manama Blackcurrent Crush", "Manama Blueberry Crush", "Manama Mango Crush", "Manama Strawberry Crush", "Maple Syrup (American Garden)", "Mayonnaise (1kg) (Refill)", "Milk Powder", "Mix Dal", "Monin Caramel Syrup", "Monin Curacao Triple Sec Syrup", "Monin French Vanilla Syrup", "Monin Hazelnut Syrup", "Monin Irish Syrup", "Monin Lavender Syrup", "Monin Mojito Syrup", "Monin Peach Syrup", "Monin Roasted Hazelnut Syrup", "Monin Rose Syrup", "Monin Vanilla Syrup", "Monin Watermelon Syrup", "Moong Dal", "nirma surf washing", "Noori Sheets (Sushi Sheets)", "Nutella (750 gms)", "Nutri Soya Keema Churi", "Oats", "Oats Milk", "Olive Oil (Extra Virgin) (1 ltr)", "Orange Juice (Real) (1 Ltr.)", "Oreo Biscuit (small - 10 piece)", "Oyster Sauce (Veg.)", "Panko Crumbs", "Parmal Rice", "Parmesan Cheese", "Penne Pasta (Agnesi)", "Peri Peri Masala", "Pineapple Crush (Manama)", "Pizza Seasoning", "Pizza Seasoning (Sachet)", "Potato Starch", "Potato Wedges (2.5 Kg)", "Pumpkin Seeds", "Quinoa (500 gms)", "Ragi Aata", "Rajma", "Red Chilli Sauce (5 Kg)", "Red Mirchi Powder", "Rice Paper", "Ricotta Cheese", "Sesame Seeds (सफेद तिल)", "Soda", "Soya Chaap", "Soya Chunks", "Spagetti Pasta (Agnesi)", "Spring Roll Sheets", "Sugar", "Sugarfree Sachets", "Sugar Sachet (White)", "Sugar Sachet (Brown)", "Suji", "Sukhi Lal Mirchi", "Sundried Tomato", "Sunflower Oil (15 Ltr)", "Sunflower Seeds", "Sushi Rice", "Sushi Vinegar", "Sweet Corn", "Table Rice", "Taco Shells", "Tahina Paste", "Tata Salt", "Tea (खुल्ली)", "Tempura Batter Mix", "Tomato Ketchup Refill (2 kg)", "Tomato Ketchup Sachet", "Tomato Puree (850 gms)", "Tonic Water", "Waffle Premix", "Walnut (खुल्ली)", "Wasabi tube", "Water Chestnut", "Wheat Starch", "White Chocolate Compound (Morde)", "White vinegar", "Wipped cream", "Yeast", "Yellow Thai Curry Paste", "नारियल का बुरा", "मक्की का आटा", "साबुत धनिया", "लौंग", "काजू टुकड़ी"
            ],
            "Packing and Consumables": [
                "Brown Paper Bag (Extra Large) (16 x 12)", "Cap", "Chopsticks", "Cling Wrap (Large)", "Extra Large Garbage Bag", "Hot coffee cup cups with lids (180 ML)", "Hot coffee cup lid (250 ML)", "Kitchen Duster", "Medium Grabage Bag", "Paper Straw (10mm)", "Pizza Boxes", "Plastic Bend Straw (Mocktails)", "Plastic Disposable Glasses with Black Lid (350ML)", "Plastic Food Container wid Lid (650ML)", "Printed Butter Paper Roll", "Silver Foil Food Container wid Lid (650ML)", "Silver Foil Food Container wid Lid (400ML) - small", "Silver Foil", "Wooden Fork", "Wooden stiring sticks for hot coffee"
            ]
        };

        const UNITS = ["Kg", "gms", "Piece", "Pkt", "Jar", "Carton", "Tin", "bunch"];

        function App() {
            const [role, setRole] = useState('staff'); 
            const [pos, setPos] = useState([]);
            const [poCounter, setPoCounter] = useState({ month: '', count: 1 });
            const [suppliers, setSuppliers] = useState([]);

            useEffect(() => {
                const savedPOs = JSON.parse(localStorage.getItem('tcm_pos')) || [];
                const savedCounter = JSON.parse(localStorage.getItem('tcm_counter')) || getInitialCounter();
                const savedSuppliers = JSON.parse(localStorage.getItem('tcm_suppliers'));
                
                setPos(savedPOs);
                setPoCounter(savedCounter);
                setSuppliers(savedSuppliers && savedSuppliers.length > 0 ? savedSuppliers : DEFAULT_SUPPLIERS);
            }, []);

            useEffect(() => {
                localStorage.setItem('tcm_pos', JSON.stringify(pos));
                localStorage.setItem('tcm_counter', JSON.stringify(poCounter));
                localStorage.setItem('tcm_suppliers', JSON.stringify(suppliers));
            }, [pos, poCounter, suppliers]);

            const getInitialCounter = () => {
                const now = new Date();
                const monthYear = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                return { month: monthYear, count: 1 };
            };

            const generatePONumber = () => {
                const now = new Date();
                const currentMonthYear = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getFullYear()).slice(-2)}`;
                let newCount = poCounter.count;
                if (poCounter.month !== currentMonthYear) { newCount = 1; }
                const paddedCount = String(newCount).padStart(3, '0');
                setPoCounter({ month: currentMonthYear, count: newCount + 1 });
                return `TCM/${currentMonthYear}/${paddedCount}`;
            };

            const submitDraftPO = (items) => {
                const newPo = {
                    id: generatePONumber(), 
                    supplier: null, // Staff no longer selects supplier
                    supplierPhone: null,
                    items, 
                    status: 'Pending',
                    date: new Date().toLocaleDateString('en-GB')
                };
                setPos([newPo, ...pos]);
                alert('Purchase Order submitted to Owner for vendor assignment & approval!');
            };

            const approvePO = (poId, supplierObj) => {
                const updatedPOs = pos.map(po => {
                    if (po.id === poId) {
                        return { 
                            ...po, 
                            status: 'Approved', 
                            supplier: supplierObj.name,
                            supplierPhone: supplierObj.phone
                        };
                    }
                    return po;
                });
                setPos(updatedPOs);
                sendWhatsApp(updatedPOs.find(p => p.id === poId));
            };

            const rejectPO = (poId) => {
                const reason = window.prompt("Reason for rejection (optional):");
                if(reason !== null) {
                    const updatedPOs = pos.map(po => po.id === poId ? { ...po, status: 'Rejected', rejectReason: reason.trim() === "" ? "No specific reason provided." : reason } : po);
                    setPos(updatedPOs);
                }
            };

            const deletePO = (poId) => {
                if(window.confirm("Are you sure you want to permanently delete this PO? This cannot be undone.")) {
                    setPos(pos.filter(po => po.id !== poId));
                }
            };

            const receivePO = (poId, receivedItemsData) => {
                const updatedPOs = pos.map(po => {
                    if (po.id === poId) {
                        return { 
                            ...po, 
                            status: 'Delivered', 
                            receivedItems: receivedItemsData,
                            deliveryDate: new Date().toLocaleDateString('en-GB')
                        };
                    }
                    return po;
                });
                setPos(updatedPOs);
                alert('Delivery confirmed and saved to history!');
            };

            const sendWhatsApp = (po) => {
                if(po.supplier === "Cash Purchase") {
                    alert("Internal Cash Purchase approved. No WhatsApp message sent.");
                    return;
                }
                const itemList = po.items.map((i, index) => `${index + 1}. ${i.name} — ${i.qty} ${i.unit}`).join('\n');
                const message = `*Subject:* New Purchase Order - The Caffeine Ministry\n*PO Number:* ${po.id}\n*Date:* ${po.date}\n\nHello ${po.supplier},\nPlease arrange the delivery of the following items:\n\n*Order Details:*\n${itemList}\n\n*Delivery Address:*\nThe Caffeine Ministry \n'PARASUDAI', 672, 12th C Road, \nSardarpura, Jodhpur\n\nPlease confirm receipt of this order.\n\nThank you,\nTeam Caffeine Ministry`;
                
                let url = `https://wa.me/`;
                if (po.supplierPhone) {
                    // Strip any dashes or spaces and append to URL
                    let phoneStr = po.supplierPhone.replace(/\D/g, '');
                    if (phoneStr.length === 10) phoneStr = '91' + phoneStr; // Add India country code if exactly 10 digits
                    url += `${phoneStr}?text=${encodeURIComponent(message)}`;
                } else {
                    url += `?text=${encodeURIComponent(message)}`;
                }
                
                window.open(url, '_blank');
            };

            const addSupplier = () => {
                const name = window.prompt("Enter new Vendor Name:");
                if (!name || name.trim() === '') return;
                const phone = window.prompt("Enter Vendor Mobile Number (Optional, for WhatsApp):");
                setSuppliers([...suppliers, { name: name.trim(), phone: phone ? phone.trim() : "" }]);
                alert(`${name} has been added to the vendor directory.`);
            };

            const handleSwitchRole = () => {
                if (role === 'staff') {
                    const pin = window.prompt("Enter Owner PIN to access dashboard:");
                    if (pin === "1701") { 
                        setRole('owner');
                    } else if (pin !== null) {
                        alert("Incorrect PIN. Access Denied.");
                    }
                } else {
                    setRole('staff');
                }
            };

            return (
                <div className="min-h-screen bg-parchment pb-20">
                    <header className="bg-hunter text-parchment p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-serif font-bold tracking-wide">The Caffeine Ministry</h1>
                            <p className="text-xs text-antiqueGold uppercase tracking-widest font-sans">Purchase Orders</p>
                        </div>
                        <button onClick={handleSwitchRole} className="bg-antiqueGold text-hunter text-sm font-bold py-1 px-3 rounded shadow-sm hover:bg-yellow-500 transition">
                            {role === 'staff' ? 'Owner Login' : 'Log Out to Staff'}
                        </button>
                    </header>
                    <main className="max-w-md mx-auto mt-6 px-4">
                        {role === 'staff' ? 
                            <StaffView inventory={INVENTORY} units={UNITS} onSubmit={submitDraftPO} pos={pos} onReceive={receivePO} /> : 
                            <OwnerView pos={pos} onApprove={approvePO} onReject={rejectPO} onDelete={deletePO} suppliers={suppliers} addSupplier={addSupplier} />
                        }
                    </main>
                </div>
            );
        }

        function StaffView({ inventory, units, onSubmit, pos, onReceive }) {
            const [cart, setCart] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState(Object.keys(inventory)[0]);
            const [searchTerm, setSearchTerm] = useState('');
            const [receivingPO, setReceivingPO] = useState(null);
            const [receivedQuantities, setReceivedQuantities] = useState({});

            const addItem = (item) => { if (!cart.find(i => i.name === item)) setCart([...cart, { name: item, qty: 1, unit: 'Kg' }]); };
            const updateQty = (index, delta) => { const newCart = [...cart]; newCart[index].qty = Math.max(1, newCart[index].qty + delta); setCart(newCart); };
            const updateUnit = (index, unit) => { const newCart = [...cart]; newCart[index].unit = unit; setCart(newCart); };
            const removeItem = (index) => setCart(cart.filter((_, i) => i !== index));

            const handleSubmit = () => {
                if (cart.length === 0) return alert('Cart is empty.');
                onSubmit(cart); // NO SUPPLIER REQUIRED NOW
                setCart([]); setSearchTerm('');
            };

            const openReceiveScreen = (po) => {
                setReceivingPO(po);
                const initialQty = {};
                po.items.forEach((item, idx) => { initialQty[idx] = item.qty; });
                setReceivedQuantities(initialQty);
            };

            const updateReceivedQty = (idx, value) => {
                setReceivedQuantities({ ...receivedQuantities, [idx]: Number(value) });
            };

            const submitReceive = () => {
                const receivedItemsData = receivingPO.items.map((item, idx) => ({
                    ...item,
                    receivedQty: receivedQuantities[idx]
                }));
                onReceive(receivingPO.id, receivedItemsData);
                setReceivingPO(null);
            };

            let displayedItems = [];
            if (searchTerm.trim() !== '') {
                const allItemNames = Object.values(inventory).flat();
                displayedItems = [...new Set(allItemNames)].filter(item => item.toLowerCase().includes(searchTerm.toLowerCase()));
            } else {
                displayedItems = inventory[selectedCategory];
            }

            const incomingPOs = pos.filter(po => po.status === 'Approved');

            if (receivingPO) {
                return (
                    <div className="animate-fade-in bg-white p-4 rounded-lg shadow-md border-t-4 border-hunter">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-xl font-serif font-bold text-hunter">Delivery Intake</h2>
                            <button onClick={() => setReceivingPO(null)} className="text-red-500 font-bold">Cancel</button>
                        </div>
                        <p className="text-sm text-gray-600 mb-2"><strong>PO:</strong> {receivingPO.id}</p>
                        <p className="text-sm text-gray-600 mb-4"><strong>Vendor:</strong> {receivingPO.supplier}</p>
                        
                        <div className="bg-gray-50 p-3 rounded mb-6 max-h-80 overflow-y-auto">
                            <div className="flex justify-between text-xs font-bold text-gray-500 uppercase mb-2 border-b pb-2">
                                <span className="w-1/2">Item Name</span>
                                <span className="w-1/4 text-center">Ordered</span>
                                <span className="w-1/4 text-center">Received</span>
                            </div>
                            {receivingPO.items.map((item, idx) => (
                                <div key={idx} className="flex justify-between items-center border-b py-3 last:border-0">
                                    <span className="text-sm w-1/2 pr-2">{item.name}</span>
                                    <span className="text-sm text-center w-1/4 text-gray-500">{item.qty} {item.unit}</span>
                                    <div className="w-1/4 flex justify-center">
                                        <input 
                                            type="number" 
                                            min="0"
                                            className="w-16 border border-hunter rounded p-1 text-center font-bold"
                                            value={receivedQuantities[idx]}
                                            onChange={(e) => updateReceivedQty(idx, e.target.value)}
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={submitReceive} className="w-full bg-hunter text-parchment font-bold py-3 rounded shadow-md hover:bg-green-900 transition">
                            Confirm Delivery
                        </button>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in">
                    
                    {incomingPOs.length > 0 && (
                        <div className="mb-8 bg-blue-50 border border-blue-200 rounded-lg p-4 shadow-sm">
                            <h3 className="text-sm font-bold uppercase tracking-widest text-blue-800 mb-3 flex items-center">
                                🚚 Incoming Deliveries
                            </h3>
                            {incomingPOs.map(po => (
                                <div key={po.id} className="bg-white p-3 rounded shadow-sm mb-2 border-l-4 border-blue-500 flex justify-between items-center">
                                    <div>
                                        <p className="font-bold text-sm">{po.id}</p>
                                        <p className="text-xs text-gray-600">{po.supplier}</p>
                                    </div>
                                    <button onClick={() => openReceiveScreen(po)} className="bg-blue-600 text-white text-xs font-bold py-2 px-3 rounded hover:bg-blue-700 shadow-sm">
                                        Receive
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    <h2 className="text-xl font-serif font-semibold border-b-2 border-hunter pb-2 mb-4">Draft New Request</h2>
                    
                    <div className="relative mb-4 shadow-sm">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span className="text-gray-400">🔍</span></div>
                        <input type="text" className="w-full pl-10 p-3 border border-hunter bg-white rounded" placeholder="Search ingredients, items..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}/>
                    </div>

                    {!searchTerm && (
                        <div className="flex overflow-x-auto space-x-2 mb-4 pb-2">
                            {Object.keys(inventory).map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`whitespace-nowrap px-4 py-2 text-sm rounded-full border ${selectedCategory === cat ? 'bg-hunter text-parchment' : 'bg-white text-hunter border-hunter'}`}>
                                    {cat.split(' ')[0]}
                                </button>
                            ))}
                        </div>
                    )}

                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-3 mb-6 h-64 overflow-y-auto">
                        {displayedItems.length === 0 ? <p className="text-gray-500 text-sm text-center py-4">No items found</p> : 
                            displayedItems.map(item => (
                                <div key={item} className="flex justify-between items-center py-2 border-b last:border-0">
                                    <span className="text-sm pr-2">{item}</span>
                                    <button onClick={() => addItem(item)} className="text-antiqueGold text-xl font-bold px-3 hover:scale-110 transition">+</button>
                                </div>
                            ))
                        }
                    </div>

                    {cart.length > 0 && (
                        <div className="bg-hunter text-parchment rounded-lg p-4 shadow-md mb-6">
                            <h3 className="font-serif font-bold text-lg mb-3">Order Cart</h3>
                            {cart.map((item, idx) => (
                                <div key={idx} className="flex flex-col mb-3 bg-white/10 p-2 rounded">
                                    <div className="flex justify-between items-start mb-2">
                                        <span className="text-sm font-semibold">{item.name}</span>
                                        <button onClick={() => removeItem(idx)} className="text-red-300 text-xs">✕</button>
                                    </div>
                                    <div className="flex items-center space-x-3">
                                        <div className="flex items-center bg-white text-hunter rounded overflow-hidden shadow-sm">
                                            <button onClick={() => updateQty(idx, -1)} className="px-3 py-1 bg-gray-200 hover:bg-gray-300">-</button>
                                            <span className="px-3 py-1 font-bold w-12 text-center">{item.qty}</span>
                                            <button onClick={() => updateQty(idx, 1)} className="px-3 py-1 bg-gray-200 hover:bg-gray-300">+</button>
                                        </div>
                                        <select className="text-hunter bg-white p-1 rounded w-24 text-sm shadow-sm" value={item.unit} onChange={(e) => updateUnit(idx, e.target.value)}>
                                            {units.map(u => <option key={u} value={u}>{u}</option>)}
                                        </select>
                                    </div>
                                </div>
                            ))}
                            <button onClick={handleSubmit} className="w-full mt-4 bg-antiqueGold text-hunter font-bold py-3 rounded uppercase tracking-wider hover:bg-yellow-500 shadow-lg transition">
                                Submit Draft to Owner
                            </button>
                        </div>
                    )}

                    <div className="mt-8 pt-4 border-t border-gray-300">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-antiqueGold mb-3">Recent Orders Status</h3>
                        {pos.length === 0 ? <p className="text-sm text-gray-500 italic">No orders submitted yet.</p> : 
                            pos.slice(0, 5).map(po => (
                                <div key={po.id} className={`bg-white p-3 rounded shadow-sm mb-2 border-l-4 ${po.status === 'Rejected' ? 'border-red-500' : po.status === 'Approved' ? 'border-blue-500' : po.status === 'Delivered' ? 'border-green-500' : 'border-yellow-500'}`}>
                                    <div className="flex justify-between items-center mb-1">
                                        <p className="font-bold text-sm">{po.id}</p>
                                        <span className={`text-xs px-2 py-1 rounded ${po.status === 'Rejected' ? 'bg-red-100 text-red-800' : po.status === 'Approved' ? 'bg-blue-100 text-blue-800' : po.status === 'Delivered' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}`}>{po.status}</span>
                                    </div>
                                    <p className="text-xs text-gray-500">
                                        {po.supplier || 'Awaiting Vendor Assignment'}
                                    </p>
                                    {po.status === 'Rejected' && po.rejectReason && <p className="text-xs text-red-600 mt-2 bg-red-50 p-2 rounded"><strong>Note:</strong> {po.rejectReason}</p>}
                                </div>
                            ))
                        }
                    </div>
                </div>
            );
        }

        function OwnerView({ pos, onApprove, onReject, onDelete, suppliers, addSupplier }) {
            const pendingPOs = pos.filter(po => po.status === 'Pending');
            const historyPOs = pos.filter(po => po.status !== 'Pending');

            // Track supplier selections for pending POs
            const [selectedSuppliers, setSelectedSuppliers] = useState({});

            const handleSupplierChange = (poId, supplierName) => {
                setSelectedSuppliers({ ...selectedSuppliers, [poId]: supplierName });
            };

            const handleApprove = (po) => {
                const supplierName = selectedSuppliers[po.id];
                if (!supplierName) {
                    return alert("You must assign a vendor to this order before approving.");
                }
                const supplierObj = suppliers.find(s => s.name === supplierName);
                onApprove(po.id, supplierObj);
            };

            return (
                <div className="animate-fade-in">
                    <h2 className="text-xl font-serif font-semibold border-b-2 border-hunter pb-2 mb-4">Owner Dashboard</h2>
                    
                    {/* NEW SECTION: Vendor Management */}
                    <div className="mb-6 bg-white p-4 rounded-lg shadow-md border border-gray-200">
                        <div className="flex justify-between items-center mb-2">
                            <h3 className="font-bold text-hunter text-sm uppercase tracking-widest">Manage Directory</h3>
                            <button onClick={addSupplier} className="bg-antiqueGold text-hunter text-xs font-bold py-1 px-3 rounded shadow-sm hover:bg-yellow-500 transition">
                                + Add New Vendor
                            </button>
                        </div>
                        <p className="text-xs text-gray-500">Currently {suppliers.length} vendors attached with contact details.</p>
                    </div>

                    <div className="mb-8">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-antiqueGold mb-3">Pending Approvals ({pendingPOs.length})</h3>
                        {pendingPOs.length === 0 ? <div className="bg-white p-6 rounded text-center border shadow-sm text-gray-500 italic">☕ All caught up! No pending drafts.</div> : 
                            pendingPOs.map(po => (
                                <div key={po.id} className="bg-white rounded-lg shadow-md border border-yellow-400 p-4 mb-4 relative">
                                    <button onClick={() => onDelete(po.id)} className="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-xl" title="Delete PO">🗑️</button>
                                    <div className="flex justify-between items-center mb-2 pr-6">
                                        <span className="font-bold text-hunter">{po.id}</span>
                                        <span className="text-xs bg-yellow-100 text-yellow-800 px-2 py-1 rounded">Pending</span>
                                    </div>
                                    
                                    {/* NEW: Owner selects the vendor here */}
                                    <div className="mb-3 bg-yellow-50 p-2 rounded border border-yellow-200">
                                        <label className="block text-xs font-bold text-yellow-800 mb-1">Assign Vendor for this Order:</label>
                                        <select 
                                            value={selectedSuppliers[po.id] || ''} 
                                            onChange={(e) => handleSupplierChange(po.id, e.target.value)}
                                            className="w-full p-2 border border-yellow-400 bg-white rounded text-sm focus:outline-none focus:ring-2 focus:ring-yellow-500"
                                        >
                                            <option value="">-- Choose Vendor Directory --</option>
                                            {suppliers.map(s => <option key={s.name} value={s.name}>{s.name} {s.phone ? `(${s.phone})` : ''}</option>)}
                                        </select>
                                    </div>

                                    <ul className="text-sm mb-4 bg-gray-50 p-3 rounded">
                                        {po.items.map((item, idx) => <li key={idx} className="flex justify-between border-b pb-1 mb-1 last:border-0 last:pb-0 last:mb-0"><span className="pr-2">{item.name}</span><span className="font-bold whitespace-nowrap">{item.qty} {item.unit}</span></li>)}
                                    </ul>
                                    <div className="flex space-x-2 mt-4">
                                        <button onClick={() => onReject(po.id)} className="w-1/3 bg-red-50 text-red-700 font-bold py-3 rounded border shadow-sm hover:bg-red-100 transition">Reject</button>
                                        <button onClick={() => handleApprove(po)} className="w-2/3 bg-hunter text-parchment font-bold py-3 rounded shadow-md hover:bg-green-900 transition">Approve & Send</button>
                                    </div>
                                </div>
                            ))
                        }
                    </div>

                    <div>
                        <h3 className="text-sm font-bold uppercase tracking-widest text-antiqueGold mb-3">Recent History</h3>
                        {historyPOs.map(po => (
                            <div key={po.id} className={`flex flex-col bg-white p-3 rounded shadow-sm mb-2 border-l-4 relative ${po.status === 'Rejected' ? 'border-red-500' : po.status === 'Delivered' ? 'border-green-500' : 'border-blue-500'}`}>
                                <button onClick={() => onDelete(po.id)} className="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-lg" title="Delete PO">🗑️</button>
                                <div className="flex justify-between items-center mb-1 pr-6">
                                    <div><p className="font-bold text-sm">{po.id}</p><p className="text-xs text-gray-500">{po.supplier}</p></div>
                                    <span className={`text-xs px-2 py-1 rounded ${po.status === 'Rejected' ? 'bg-red-100 text-red-800' : po.status === 'Delivered' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`}>{po.status}</span>
                                </div>
                                {po.status === 'Rejected' && po.rejectReason && <p className="text-xs text-red-600 mt-2 italic bg-red-50 p-2 rounded">Reason: {po.rejectReason}</p>}
                                
                                {po.status === 'Delivered' && po.receivedItems && (
                                    <div className="mt-2 border-t pt-2">
                                        <p className="text-xs font-bold text-gray-600 mb-1">Receipt Details ({po.deliveryDate}):</p>
                                        <ul className="text-xs space-y-1">
                                            {po.receivedItems.map((item, idx) => {
                                                const hasVariance = item.qty !== item.receivedQty;
                                                return (
                                                    <li key={idx} className={`flex justify-between p-1 rounded ${hasVariance ? 'bg-red-50 text-red-700 font-bold' : 'text-gray-500'}`}>
                                                        <span className="truncate pr-2">{item.name}</span>
                                                        <span className="whitespace-nowrap">
                                                            {hasVariance ? `Ord: ${item.qty} → Rec: ${item.receivedQty} ${item.unit}` : `${item.receivedQty} ${item.unit} (OK)`}
                                                        </span>
                                                    </li>
                                                );
                                            })}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
      }
    </script>
</body>
</html>
